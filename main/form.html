<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=M+PLUS+Rounded+1c&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style1.css">
    <title>PureEnergy - Renewable Energy Solutions</title>
</head>

<body>
    <div class="container-fluid vh-100">
    <div class="row h-100">
        <a href="index.html" class="arrow-back animate__animated animate__fadeInLeft">
            <i class="bi bi-arrow-left-circle"></i>
        </a>        
        <div class="col-md-7 d-flex align-items-center justify-content-center">
            <div class="ex-main">
                <h3 class="mb-3 mt-2 text-center form-title animate__animated animate__fadeInLeft">Pure<span  style="color: rgb(219, 208, 3);">Energy</span> Form</h3>        
                <form action="landing.html" method="get" class="animate__animated animate__fadeInLeft"> 
                    <div class="mb-1">
                        <label class="form-label input-text" for="name">Nama:</label>
                        <input type="text" id="name" class="form-control form-control-sm input" placeholder="your name" required>
                    </div>
                    
                    <div class="mb-1">
                        <label class="form-label input-text" for="email">Email:</label>
                        <input type="email" id="email" class="form-control form-control-sm input" placeholder="example@gmail.com" required>
                    </div>

                    <div class="mb-1">
                        <label class="form-label input-text" for="password">Password:</label>
                        <input type="password" id="password" class="form-control form-control-sm input" placeholder="password" min="4" required>
                    </div>

                    <div class="mb-1">
                        <label class="form-label input-text" for="number">Jumlah Unit:</label>
                        <input type="number" id="number" class="form-control form-control-sm input" placeholder="0" required min="1">
                    </div>

                    <div class="mb-1">
                        <label class="form-label input-text">Produk:</label>
                        <select class="form-select form-select-sm input">
                            <option>Pilih Jenis Produk</option>
                            <option>Panel Surya</option>
                            <option>Turbin Angin</option>
                            <option>Tesla Powerwall</option>
                        </select>
                    </div>

                    <div class="mb-2">
                        <label class="d-block mb-1 input-text">Paket:</label>
                        <input type="radio" name="package" id="basic"><label class="me-2 input-text">&nbsp;Basic&nbsp;</label>
                        <input type="radio" name="package" id="premium"><label class="input-text">&nbsp;Standard&nbsp;&nbsp;</label>
                        <input type="radio" name="package" id="ultimate"><label class="input-text">&nbsp;Premium</label>
                    </div>

                    <div class="mb-3">
                        <input type="checkbox" required>
                        <label class="small text-secondary">Setuju syarat & ketentuan</label>
                    </div>
                    <div class="d-flex">
                        <button type="reset" class="btn col-md-1 btn-reset justify-content-center align-items-center" style="width: 40px; height: 40px;"><i class="bi bi-arrow-repeat" style="color: #ffffff;"></i></button>
                        <button type="submit" class="btn col-md-10 btn-submit">Submit</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-md-5 p-0 d-none d-md-block animate__animated animate__fadeInRight">
            <img src="../assets/form.jpg" class="img-form" alt="Renewable Energy">
            <div class="text-overlay-title form-title">Pure<span  style="color: rgb(219, 208, 3);">Energy</span></div>
            <div class="text-overlay">Renewable Energy Starts Here</div>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
