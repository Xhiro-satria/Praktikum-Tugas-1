<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=M+PLUS+Rounded+1c&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/index.css">
    <title>PureEnergy - Renewable Energy Solutions</title>
</head>

<body>
    <!-- navbar -->
    <nav class="navbar navbar-expand-lg animate__animated animate__fadeInDown">
        <div class="container">
            <a class="navbar-brand" href="">
                <img src="../assets/logo.png" class="navbar-logo" alt="logo">Pure<span style="color: rgb(219, 208, 3);">Energy</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-start" id="navbarNav">  
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a href="" class="nav-link nav-panel">Home</a></li>
                    <li class="nav-item"><a href="" class="nav-link nav-panel">About</a></li>
                    <li class="nav-item"><a href="" class="nav-link nav-panel" style="margin-right: 30px;">Services</a></li>
                    <li class="nav-item">
                        <a href="https://instagram.com/strdn99"><button class="btn-nav">Contact</button></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- navbar end -->

    <!-- main -->
    <main class="main-menu">
        <div class="container d-flex justify-content-center align-items-center">
            <div class="row">
                <div class="col-md-6 main-text">
                    <h1 class="display-4 main-title animate__animated animate__fadeInLeft">Renewable Energy Starts Here</h1>
                    <p class="lead main-subtitle animate__animated animate__fadeInLeft customTitle-delay">Transformasi energi terbarukan untuk masa depan yang lebih cerah.</p>
                    <div class="d-flex align-items-center gap-3 animate__animated animate__fadeInLeft customBtn-delay">
                        <a href="form.html" class="btn btn-primary main-btn">Let's Join</a>
                        <i class="bi bi-arrow-left main-arrow"></i>
                    </div>
                </div>
                <div class="col-md-5">
                <!-- carousel -->
                    <div id="carouselExampleIndicators" class="carousel rounded-4 slide overflow-hidden" data-wrap="true" main-subtitle animate__animated animate__fadeInLeft >
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
                        <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="3" aria-label="Slide 4"></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="../assets/panel1.jpg" class="d-block w-100 animate__animated animate__fadeInRight" alt="...">
                        </div>
                        <div class="carousel-item">
                            <img src="../assets/turbin2.jpg" class="d-block w-100 animate__animated animate__fadeInRight" alt="...">
                        </div>
                        <div class="carousel-item">
                            <img src="../assets/turbin1.jpg" class="d-block w-100 animate__animated animate__fadeInRight" alt="...">
                        </div>
                        <div class="carousel-item">
                            <img src="../assets/panel2.jpg" class="d-block w-100 animate__animated animate__fadeInRight" alt="...">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- main end -->
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
